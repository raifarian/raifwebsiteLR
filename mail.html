<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact</title>

<style>

/* Google Font */
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

/* Dark Background */

body{
background:linear-gradient(135deg,#0f0f0f,#1b1b1b);
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

/* CONTACT SECTION */

#contact{
width:90%;
max-width:600px;
text-align:center;
animation:fadeIn 1.2s ease;
}

.section__text__p1{
color:#ff4db8;
letter-spacing:2px;
font-size:14px;
margin-bottom:10px;
}

.title{
font-size:40px;
margin-bottom:25px;
background:linear-gradient(90deg,#ff4db8,#ff8ad6);
-webkit-background-clip:text;
color:transparent;
}

/* Glass Neon Container */

.contact-info-upper-container{
display:flex;
justify-content:center;
align-items:center;
gap:20px;
padding:20px;
border-radius:20px;

background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);

border:1px solid rgba(255,77,184,0.4);

box-shadow:
0 0 10px rgba(255,77,184,0.4),
0 0 30px rgba(255,77,184,0.2);

transition:0.4s;
}

/* Hover glow */

.contact-info-upper-container:hover{
box-shadow:
0 0 20px rgba(255,77,184,0.7),
0 0 60px rgba(255,77,184,0.4);
}

/* Contact container */

.contact-info-container{
display:flex;
align-items:center;
gap:12px;
padding:10px 15px;
border-radius:12px;
transition:0.3s;
}

.contact-info-container:hover{
background:rgba(255,77,184,0.1);
transform:translateY(-3px);
}

/* Text */

.contact-info-container p{
font-size:16px;
}

/* Email link */

.contact-info-container a{
text-decoration:none;
color:#ff8ad6;
transition:0.3s;
}

.contact-info-container a:hover{
color:#ff4db8;
text-shadow:0 0 10px #ff4db8;
}

/* Icon */

.contact-icon{
width:28px;
height:28px;
filter:drop-shadow(0 0 6px #ff4db8);
}

/* Fade animation */

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* MOBILE RESPONSIVE */

@media (max-width:600px){

.title{
font-size:30px;
}

.contact-info-upper-container{
flex-direction:column;
padding:18px;
gap:10px;
}

.contact-info-container{
justify-content:center;
}

.contact-info-container p{
font-size:15px;
}

.contact-icon{
width:24px;
height:24px;
}

}

</style>
</head>

<body>

<section id="contact">

<p class="section__text__p1">Get in Touch</p>

<h1 class="title">Contact Me</h1>

<div class="contact-info-upper-container">

<div class="contact-info-container">

<img
src="./assets/email.png"
alt="Email icon"
class="contact-icon"
/>

<p>
<a href="mailto:raifarian7@gmail.com">
Example@gmail.com
</a>
</p>

</div>

</div>

</section>

</body>
</html>
